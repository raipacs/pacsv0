services:
  orthanc:
    image: jodogne/orthanc-plugins:1.12.11
    container_name: rai-pacs-orthanc
    restart: unless-stopped
    ports:
      - "4242:4242"
      - "127.0.0.1:8042:8042"
    volumes:
      - orthanc-db:/var/lib/orthanc/db
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro

volumes:
  orthanc-db:
